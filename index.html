<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Usuários</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 40px auto;
        }

        .card {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            padding: 10px;
            cursor: pointer;
        }

        .message {
            margin-top: 15px;
            font-weight: bold;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Cadastro de Usuário</h2>

        <input id="username" type="text" placeholder="Usuário">

        <input id="e-mail" type="email" placeholder="E-mail">

        <input id="password" type="password" placeholder="Senha">

        <input id="password2" type="password" placeholder="Confirmar Senha">

        <button onclick="registerUser()">
            Cadastrar
        </button>

        <div id="message" class="message"></div>
    </div>

    <script>
async function registerUser() {

    const username =
        document.getElementById("username").value;

    const email =
        document.getElementById("e-mail").value;

    const password =
        document.getElementById("password").value;

    const password2 =
        document.getElementById("password2").value;

    const message =
        document.getElementById("message");

    if (!username || !email || !password || !password2) {
        message.className = "message error";
        message.innerText = "Preencha todos os campos.";
        return;
    }

    if (password !== password2) {
        message.className = "message error";
        message.innerText = "As senhas não coincidem.";
        return;
    }

    try {

        const response = await fetch(
            "https://api.fake-company.com/users/create",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username,
                    email,
                    password
                })
            }
        );

        if (response.ok) {
            message.className = "message success";
            message.innerText =
                "Usuário cadastrado com sucesso!";
        } else {
            message.className = "message error";
            message.innerText =
                "Erro ao cadastrar usuário.";
        }

    } catch (error) {

        message.className = "message error";
        message.innerText =
            "Erro ao conectar com o servidor.";
    }
}
</script>
